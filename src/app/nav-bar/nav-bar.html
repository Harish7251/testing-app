<div class="header">
  <div class="header-title-wrapper">
    <button class="mobile-menu-btn" (click)="toggleSidebar()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
    <h2 *ngIf="!isLoading">
      <img src="/new_logo_side_bar.png" alt="" style="width:38%;">
    </h2>
    <div *ngIf="isLoading" class="skeleton skeleton-text skeleton-page-title"></div>
  </div>

  <div class="user-profile-container" style="position: relative;">
    <div class="user-profile" *ngIf="!isLoading" (click)="toggleProfile()" style="cursor: pointer;">
      <button class="theme-toggle-btn" (click)="$event.stopPropagation(); toggleTheme()" style="background: none; border: none; font-size: 18px; cursor: pointer; margin-right: 8px; transition: transform 0.2s;">
        {{ isDarkTheme ? '☀️' : '🌙' }}
      </button>
      <span>Admin User</span>
      <div class="avatar">A</div>
    </div>

    <!-- Dropdown Modal -->
    <div class="profile-dropdown" *ngIf="isProfileOpen && !isLoading">
      <div class="profile-dropdown-header">
        <div class="avatar large">A</div>
        <div class="profile-info">
          <h4>Admin User</h4>
          <p>admin@punjab.gov.in</p>
        </div>
      </div>
      <div class="profile-dropdown-body">
        <div class="detail-row">
          <span class="label">Role:</span>
          <span class="value role-badge" style="background:#007aff;color:white;border:none;">Super Admin</span>
        </div>
        <div class="detail-row">
          <span class="label">Department:</span>
          <span class="value">Finance</span>
        </div>
        <div class="detail-row" style="margin-top:4px;">
          <span class="label">Last Login:</span>
          <span class="value" style="font-size:12px;color:#64748b;">Today, 10:42 AM</span>
        </div>
      </div>
      <div class="profile-dropdown-footer">
        <button class="action-btn" (click)="toggleProfile()">Edit</button>
        <button class="action-btn logout" (click)="toggleProfile()">Sign Out</button>
      </div>
    </div>
  </div>
  <div class="user-profile-skeleton" *ngIf="isLoading">
    <div class="skeleton skeleton-text skeleton-username"></div>
    <div class="skeleton skeleton-avatar"></div>
  </div>
</div>
