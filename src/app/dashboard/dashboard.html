<!-- Premium Metrics Grid -->
<div class="metrics-grid">
  <!-- Skeleton Loading for Graphs -->
  <ng-container *ngIf="isLoading">
    <div class="skeleton skeleton-graph-card"></div>
    <div class="skeleton skeleton-graph-card"></div>
  </ng-container>

  <!-- Actual Premium Charts -->
  <ng-container *ngIf="!isLoading">
    <!-- Chart 1: Revenue Line Chart -->
    <div class="metric-card premium-card">
      <div class="metric-header">
        <div>
          <p class="metric-subtitle">Total Revenue</p>
          <h3 class="metric-title">$45,231.89</h3>
        </div>
        <span class="trend up">↑ 24%</span>
      </div>
      <div class="chart-wrapper line-chart">
        <svg viewBox="0 0 400 150" class="svg-chart">
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="rgba(33, 100, 243, 0.4)" />
              <stop offset="100%" stop-color="rgba(33, 100, 243, 0)" />
            </linearGradient>
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feComposite in="SourceGraphic" in2="blur" operator="over" />
            </filter>
          </defs>
          <path class="area"
            d="M0,150 L0,100 C50,120 100,40 150,70 C200,100 250,30 300,60 C350,90 400,20 400,20 L400,150 Z"
            fill="url(#gradient)"></path>
          <path class="line glow-line" d="M0,100 C50,120 100,40 150,70 C200,100 250,30 300,60 C350,90 400,20 400,20"
            fill="none" stroke="#2164f3" stroke-width="4" stroke-linecap="round" filter="url(#glow)"></path>

          <circle cx="100" cy="65" r="5" class="point"></circle>
          <circle cx="200" cy="85" r="5" class="point"></circle>
          <circle cx="300" cy="55" r="5" class="point"></circle>
        </svg>
      </div>
    </div>

    <!-- Chart 2: Goal Donut Chart -->
    <div class="metric-card premium-card">
      <div class="metric-header">
        <div>
          <p class="metric-subtitle">Monthly Goal</p>
          <h3 class="metric-title">85%</h3>
        </div>
        <span class="trend neutral">On Track</span>
      </div>
      <div class="chart-wrapper donut-chart">
        <svg viewBox="0 0 36 36" class="circular-chart blue">
          <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path class="circle animated-circle" stroke-dasharray="85, 100"
            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <text x="18" y="20.35" class="percentage">85%</text>
        </svg>
        <div class="donut-legend">
          <div class="legend-item"><span class="dot blue"></span> Completed</div>
          <div class="legend-item"><span class="dot grey"></span> Remaining</div>
        </div>
      </div>
    </div>
  </ng-container>
</div>

<div class="table-container">
  <table class="data-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>User Info</th>
        <th>Contact</th>
        <th>Role</th>
        <th>Status</th>
      </tr>
    </thead>
    <!-- Skeleton Loading View -->
    <tbody *ngIf="isLoading">
      <tr *ngFor="let i of [1,2,3,4,5]">
        <td>
          <div class="skeleton skeleton-text skeleton-id"></div>
        </td>
        <td>
          <div class="skeleton skeleton-text skeleton-name"></div>
          <div class="skeleton skeleton-text skeleton-sub" style="margin-top: 5px;"></div>
        </td>
        <td>
          <div class="skeleton skeleton-text"></div>
        </td>
        <td>
          <div class="skeleton skeleton-text skeleton-role"></div>
        </td>
        <td>
          <div class="skeleton skeleton-text skeleton-status"></div>
        </td>
      </tr>
    </tbody>

    <!-- Actual Data View -->
    <tbody *ngIf="!isLoading">
      <tr *ngFor="let user of tableData">
        <td><strong>{{ user.id }}</strong></td>
        <td>
          <div class="user-name">{{ user.name }}</div>
          <div class="user-email">{{ user.email }}</div>
        </td>
        <td>{{ user.contact }}</td>
        <td><span class="role-badge">{{ user.role }}</span></td>
        <td><span class="status-badge" [ngClass]="user.status.toLowerCase()">{{ user.status }}</span></td>
      </tr>
    </tbody>
  </table>
</div>
